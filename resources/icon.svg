      <stop offset="0%" stop-color="#120d2a"/>
      <stop offset="100%" stop-color="#06080f"/>
    </radialGradient>
    <linearGradient id="txt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
